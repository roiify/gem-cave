<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rylan's Mine — Dig for Treasure!</title>
  <meta name="description" content="Tap-to-dig mining game: procedural caves full of real gemstones from Rylan's Gem Cave.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E⛏️%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mine.css">
</head>
<body>
  <canvas id="mine"></canvas>

  <header class="mine-top">
    <a class="pill" href="./">💎 Gem Cave</a>
    <h1>⛏️ RYLAN'S MINE</h1>
    <button class="pill" id="muteBtn">🔊</button>
  </header>

  <div class="hud">
    <div class="pill">⛏️ <b id="swings">60</b> swings</div>
    <div class="pill">🕳️ Cave <b id="caveNum">1</b></div>
    <button class="pill" id="bagBtn">🎒 <b id="bagCount">0</b></button>
    <button class="pill" id="newCaveBtn">🆕 New cave</button>
  </div>

  <div id="toast"></div>
  <div id="overlay"></div>

  <script type="module" src="mine.js"></script>
</body>
</html>
